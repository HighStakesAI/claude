  <style>
    #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#080808;z-index:99999;transition:opacity .5s ease}

    #boot .ring{width:44px;height:44px;border-radius:50%;border:3px solid rgba(212,175,55,.16);border-top-color:#D4AF37;animation:bootspin .8s linear infinite;margin:0 auto 16px}

<body>
  <div id="boot"><div><div class="ring"></div><div class="wm">High <span>Stakes</span></div></div></div>
  <div id="root"></div>
  <script>(function(){var b=document.getElementById('boot');if(!b)return;function hide(){b.classList.add('hide');setTimeout(function(){if(b&&b.parentNode)b.parentNode.removeChild(b);},600);}var n=0,t=setInterval(function(){n++;var r=document.getElementById('root');if(r&&r.children.length){clearInterval(t);hide();}else if(n>200){clearInterval(t);hide();}},40);})();</script>
